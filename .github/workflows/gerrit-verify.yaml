---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2026 The Linux Foundation

name: Gerrit Verify

# yamllint disable-line rule:truthy
on:
  workflow_dispatch:
    inputs:
      GERRIT_BRANCH:
        description: "Branch that change is against"
        required: true
        type: string
      GERRIT_CHANGE_ID:
        description: "The ID for the change"
        required: true
        type: string
      GERRIT_CHANGE_NUMBER:
        description: "The Gerrit number"
        required: true
        type: string
      GERRIT_CHANGE_URL:
        description: "URL to the change"
        required: true
        type: string
      GERRIT_EVENT_TYPE:
        description: "Type of Gerrit event"
        required: true
        type: string
      GERRIT_PATCHSET_NUMBER:
        description: "The patch number for the change"
        required: true
        type: string
      GERRIT_PATCHSET_REVISION:
        description: "The revision sha"
        required: true
        type: string
      GERRIT_PROJECT:
        description: "Project in Gerrit"
        required: true
        type: string
      GERRIT_REFSPEC:
        description: "Gerrit refspec of change"
        required: true
        type: string

concurrency:
  # yamllint disable-line rule:line-length
  group: gerrit-verify-${{ github.workflow }}-${{ github.event.inputs.GERRIT_CHANGE_ID || github.run_id }}
  cancel-in-progress: true

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Notify job start
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/gerrit-review-action@a1c036a59b94c8ab89de26d378f6a28cc7378b13 # v1.1.2
        with:
          host: ${{ vars.GERRIT_SERVER }}
          username: ${{ vars.GERRIT_SSH_USER }}
          key: ${{ secrets.GERRIT_SSH_PRIVKEY }}
          known_hosts: ${{ vars.GERRIT_KNOWN_HOSTS }}
          gerrit-change-number: ${{ inputs.GERRIT_CHANGE_NUMBER }}
          gerrit-patchset-number: ${{ inputs.GERRIT_PATCHSET_NUMBER }}
          vote-type: clear
      - name: Allow replication
        run: sleep 10s

  build-nodejs:
    needs: [notify]
    runs-on: ubuntu-latest
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/checkout-gerrit-change-action@54d751e8bd167bc91f7d665dabe33fae87aaaa63 # v0.9
        with:
          gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}

      # The build toolchain is pinned to Node 10 (npm 6), matching the
      # gerrit-merge publish jobs so this verify build faithfully reproduces
      # what gets published. Node 10 is the newest version whose bundled
      # node-sass@4.9.2 still resolves a prebuilt binary (Node 12+ forces a
      # source compile that fails, and node-sass cannot build on Node 18+),
      # while its npm 6 honors the scoped `_auth` the publish workflow needs.
      # node-build-action (which assumes a modern Node) is not used, and the
      # install step below is `npm install`, not `npm ci`: package.json and the
      # committed lockfile are out of sync, so `npm ci` would refuse to run.
      # yamllint disable-line rule:line-length
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "10"

      - name: Install dependencies
        run: npm install

      - name: Build library
        run: npm run build

      - name: Build Storybook
        run: npm run storybook:build

      # Publish the built Storybook as a browsable artifact. Storybook is the
      # library's living component gallery and the render surface the storyshots
      # tests drive, so downloading and opening .storybook-out/index.html gives
      # reviewers a visual view of every component/story on the patchset.
      # yamllint disable-line rule:line-length
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() }}
        with:
          name: storybook-static
          path: .storybook-out/
          if-no-files-found: warn
          retention-days: 14

  test-nodejs:
    needs: [notify]
    runs-on: ubuntu-latest
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      # yamllint disable-line rule:line-length
      - uses: lfreleng-actions/checkout-gerrit-change-action@54d751e8bd167bc91f7d665dabe33fae87aaaa63 # v0.9
        with:
          gerrit-refspec: ${{ inputs.GERRIT_REFSPEC }}

      # The Jest suite runs headlessly (jsdom) via jest-preset-angular and needs
      # a modern Node, so this job pins Node 18 rather than the Node 8 used by
      # build-nodejs. Install flags:
      #   --ignore-scripts   skip the node-sass@4.9.2 native build (cannot
      #                      compile on Node 18); tests do not use node-sass,
      #                      since no component imports SCSS at module load.
      #   --no-package-lock  ignore the committed lockfileVersion 1 lock, whose
      #                      fsevents@1.2.4 entry is darwin-only and makes a
      #                      modern npm fail with EBADPLATFORM on the Linux
      #                      runner. The lock cannot be regenerated without
      #                      breaking build-nodejs, whose Node 8 npm reads v1.
      # yamllint disable-line rule:line-length
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install --ignore-scripts --no-package-lock

      - name: Run unit tests with coverage
        run: npm test -- --ci --coverage

      # Publish the HTML coverage report as a browsable artifact. Downloading and
      # opening coverage/index.html gives a per-file, per-line coverage view.
      # Uploaded on success or failure so a coverage-threshold breach is still
      # inspectable.
      # yamllint disable-line rule:line-length
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ always() }}
        with:
          name: coverage-report
          path: coverage/
          if-no-files-found: warn
          retention-days: 14

  report-status:
    if: ${{ always() }}
    needs: [notify, build-nodejs, test-nodejs]
    runs-on: ubuntu-latest
    steps:
      # yamllint disable-line rule:line-length
      - uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Get workflow conclusion
        uses: im-open/workflow-conclusion@8eac7f17381a6917bc04fec3e2c92e70ebc37526 # v3.0.0

      - name: Report workflow conclusion
        # yamllint disable-line rule:line-length
        uses: lfreleng-actions/gerrit-review-action@a1c036a59b94c8ab89de26d378f6a28cc7378b13 # v1.1.2
        with:
          host: ${{ vars.GERRIT_SERVER }}
          username: ${{ vars.GERRIT_SSH_USER }}
          key: ${{ secrets.GERRIT_SSH_PRIVKEY }}
          known_hosts: ${{ vars.GERRIT_KNOWN_HOSTS }}
          gerrit-change-number: ${{ inputs.GERRIT_CHANGE_NUMBER }}
          gerrit-patchset-number: ${{ inputs.GERRIT_PATCHSET_NUMBER }}
          vote-type: ${{ env.WORKFLOW_CONCLUSION }}
